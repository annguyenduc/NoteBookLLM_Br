    required_vault_adaptations:
      - "Thích nghi các công cụ kích hoạt kỹ năng đặc thù của Antigravity (view_file trên SKILL.md file)."
      - "Tích hợp checklist thông báo bắt buộc: '🔧 Using [skill] to [purpose]' ở đầu mỗi lượt phản hồi."
      - "Bảo toàn các quy tắc override riêng của NoteBookLLM_Br (synthesis check, cấm tự động brainstorming để sinh Atom)."
    risks_if_imported:
      - "Có thể gây xung đột với các cơ chế bootstrap mặc định nếu phần tích hợp Antigravity không được cấu trúc tường minh."
    risks_if_not_imported:
      - "Thiếu kỷ luật bootstrap đầu phiên, khiến Antigravity dễ đi đường tắt mà bỏ qua việc nạp các kỹ năng phương pháp luận liên quan."
    confidence: "high"

  - superpowers_skill: "brainstorming"
    vault_equivalent: "cm-planning"
    gap_type: "partial"
    category: "core_method"
    should_import: true
    decision: "port"
    priority: "high"
    reason: "Lấy Superpowers brainstorming làm chuẩn chính cho Phase 0 (khám phá ý định và Spec nháp), thay thế cm-planning cũ của vault."
    required_vault_adaptations:
      - "Tích hợp logic phân tích rủi ro và RCA lỗi của cm-planning cũ thành một Adaptation Section bổ trợ trong brainstorming standard."
      - "Tuân thủ tuyệt đối quy định không tự ý sửa đổi code gốc hay rules hệ thống khi chưa được phê duyệt."
    risks_if_imported:
      - "Agent có thể lãng quên việc phân tích rủi ro RCA nếu tài liệu thích nghi không được cấu trúc rõ ràng."
    risks_if_not_imported:
      - "Gây Trigger Conflict nghiêm trọng ở đầu phiên khi cả cm-planning và brainstorming cùng kích hoạt."
    confidence: "high"

  - superpowers_skill: "test-driven-development"
