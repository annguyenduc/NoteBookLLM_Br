    required_vault_adaptations:
      - "Tích hợp logic self-healing đệ quy của cm-tdd cũ thành Adaptation Section bổ trợ."
      - "Bảo toàn quy định: Phải chạy test case tái hiện lỗi và chứng minh lỗi trước khi viết code sửa đổi."
    risks_if_imported:
      - "Tăng độ phức tạp của logic self-healing đệ quy nếu kịch bản test quá cồng kềnh."
    risks_if_not_imported:
      - "Quy trình kiểm thử thiếu sự thống nhất về mặt tên gọi và trigger so với chuẩn Superpowers."
    confidence: "high"

  - superpowers_skill: "systematic-debugging"
