  - superpowers_skill: "dispatching-parallel-agents"
    vault_equivalent: null
    gap_type: "missing"
    category: "core_method"
    should_import: true
    decision: "port"
    priority: "high"
    reason: "Kỹ năng phương pháp luận lõi giúp AI Agent biết cách khởi tạo, điều phối và giám sát nhiều subagent chạy song song để giải quyết các task phức tạp quy mô lớn."
    required_vault_adaptations:
      - "Tích hợp cơ chế kiểm soát token budget qua cm-context-budget cho từng tác nhân song song."
      - "Tuân thủ tuyệt đối ranh giới no-commit và no-canonical-write cho tất cả các subagent được gọi."
      - "Các subagent song song chỉ được ghi kết quả nháp vào runs/ hoặc workspaces con được chỉ định."
    risks_if_imported:
      - "Dễ gây bùng nổ token tiêu thụ và phình context nếu Agent cha không giám sát chặt chẽ trạng thái của các subagent."
    risks_if_not_imported:
      - "Agent bị giới hạn trong việc giải quyết các task lớn đòi hỏi sự phân rã công việc chạy song song."
    confidence: "high"

  - superpowers_skill: "requesting-code-review"
    vault_equivalent: "cm-code-review"
    gap_type: "partial"
    category: "core_method"
    should_import: true
    decision: "port"
    priority: "medium"
    reason: "Quy chuẩn của Superpowers hướng dẫn chi tiết cách Agent chuẩn bị và gửi yêu cầu review một cách bài bản trước khi chốt code."
    required_vault_adaptations:
      - "Loại bỏ hoàn toàn các giả định về việc tự động tạo GitHub PR."
      - "Thích nghi sang việc trình bày diff sạch và yêu cầu người dùng duyệt trực tiếp trong chat."
    risks_if_imported:
      - "Có thể làm Agent hiểu lầm là có quyền push code lên remote repository."
    risks_if_not_imported:
      - "Agent có thể bỏ qua bước trình bày diff sạch trước khi báo hoàn thành."
    confidence: "high"

  - superpowers_skill: "using-git-worktrees"
    vault_equivalent: "cm-git-flow"
    gap_type: "partial"
    category: "workflow_support"
    should_import: false
    decision: "reference_only"
    priority: "low"
    reason: "Kỹ năng hướng dẫn Agent cách tạo và dọn dẹp Git Worktree. Vault đã đóng băng ranh giới Worktree tĩnh rất cứng trong AGENTS.md nên Agent không cần tự suy lý logic này trong phiên chạy thường nhật."
    required_vault_adaptations:
      - "Không áp dụng cho runtime skill thường trực."
    risks_if_imported:
      - "Agent tự ý tạo thêm các worktrees vật lý trên ổ đĩa của người dùng gây lãng phí dung lượng và rác thư mục."
    risks_if_not_imported:
      - "Không có rủi ro đáng kể do ranh giới worktree của vault đã được thiết lập tĩnh."
    confidence: "high"

  - superpowers_skill: "finishing-a-development-branch"
    vault_equivalent: null
    gap_type: "missing"
    category: "vault_irrelevant"
    should_import: false
    decision: "reference_only"
    priority: "low"
    reason: "Kỹ năng tự động dọn dẹp Git branch, merge PR và sync branch. Vault cấm tuyệt đối việc tự động commit, push hay merge Git nhằm bảo vệ an toàn mã nguồn."
    required_vault_adaptations:
      - "Không áp dụng."
    risks_if_imported:
      - "Agent tự ý dọn dẹp branch làm mất code đang sửa của người dùng hoặc phá vỡ cấu trúc Git."
    risks_if_not_imported:
      - "Không có, quy trình Git merge và dọn dẹp branch hoàn toàn do con người quản lý tĩnh."
    confidence: "high"
